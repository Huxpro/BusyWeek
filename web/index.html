<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>BusyWeek! · Vue Lynx (Web)</title>
    <meta
      name="description"
      content="BusyWeek! — a time-based todo list, ported to Vue Lynx and running on the Lynx Web Platform."
    />
    <!--
      Lynx Web Platform runtime (@lynx-js/web-core, client_prod build). It is
      copied into ./static by scripts/assemble-web.mjs so the page is fully
      self-contained — no CDN. The runtime loads its async chunks from ./static/.
    -->
    <script type="module" src="./static/js/client.js"></script>
    <link rel="stylesheet" href="./static/css/client.css" />
    <style>
      /* Lock the outer container: no page scroll / rubber-band; the app owns
         the whole viewport and only its inner list scrolls. */
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #29b6f6; /* blue fallback behind the top status bar */
      }
      body {
        position: fixed;
        inset: 0;
        -webkit-user-select: none;
      }
      /* The Lynx viewport tracks the visual viewport so the on-screen keyboard
         pushes the app's bottom controls up instead of covering them. */
      lynx-view {
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Floating pill to copy the native Lynx bundle URL for Lynx Explorer. */
      #lynx-bundle {
        position: fixed;
        right: 12px;
        top: calc(12px + env(safe-area-inset-top));
        z-index: 2147483647;
        display: flex;
        align-items: center;
        gap: 7px;
        max-width: calc(100vw - 28px);
        padding: 8px 13px;
        border: none;
        border-radius: 22px;
        background: rgba(20, 28, 38, 0.82);
        color: #eaf3fb;
        font: 500 12px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
        cursor: pointer;
        opacity: 0.55;
        transition: opacity 0.2s ease, transform 0.15s ease;
        -webkit-backdrop-filter: blur(6px);
        backdrop-filter: blur(6px);
      }
      #lynx-bundle:hover { opacity: 1; }
      #lynx-bundle:active { transform: scale(0.96); }
      #lynx-bundle .lb-ico { font-size: 14px; }
      #lynx-bundle .lb-url {
        max-width: 46vw;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        opacity: 0.85;
      }
      #lynx-bundle.copied {
        opacity: 1;
        background: #1e88e5;
      }
    </style>
  </head>
  <body>
    <!-- `url` is relative, so this works under any base path. -->
    <lynx-view url="./main.web.bundle" height="100vh" width="100vw"></lynx-view>

    <script>
      // Keyboard avoidance (web): resize the Lynx viewport to the visual
      // viewport so the soft keyboard pushes the app's bottom bar up rather
      // than covering it. iOS Safari shrinks visualViewport when the keyboard
      // shows; we mirror that onto <lynx-view>.
      ;(function () {
        var vv = window.visualViewport
        var el = document.querySelector('lynx-view')
        if (!vv || !el) return
        function sync() {
          el.style.height = vv.height + 'px'
          el.style.transform = 'translateY(' + vv.offsetTop + 'px)'
        }
        vv.addEventListener('resize', sync)
        vv.addEventListener('scroll', sync)
        sync()
      })()
    </script>

    <!-- Copy the native Lynx bundle URL (open it in Lynx Explorer). -->
    <button id="lynx-bundle" type="button">
      <span class="lb-ico">📱</span>
      <span class="lb-label">Lynx bundle</span>
    </button>
    <script>
      (function () {
        var btn = document.getElementById('lynx-bundle')
        var url = new URL('./main.lynx.bundle', location.href).href
        btn.title = '复制原生 Lynx bundle URL，粘贴到 Lynx Explorer 打开\n' + url
        var label = btn.querySelector('.lb-label')
        var resetTimer
        btn.addEventListener('click', function () {
          var done = function () {
            btn.classList.add('copied')
            label.textContent = '已复制 ✓'
            clearTimeout(resetTimer)
            resetTimer = setTimeout(function () {
              btn.classList.remove('copied')
              label.textContent = 'Lynx bundle'
            }, 1800)
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(done, fallback)
          } else {
            fallback()
          }
          function fallback() {
            var ta = document.createElement('textarea')
            ta.value = url
            ta.style.position = 'fixed'
            ta.style.opacity = '0'
            document.body.appendChild(ta)
            ta.select()
            try { document.execCommand('copy') } catch (e) {}
            document.body.removeChild(ta)
            done()
          }
        })
      })()
    </script>
  </body>
</html>
