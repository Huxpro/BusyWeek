name: Deploy Vue Lynx web to GitHub Pages

# Builds the Vue Lynx *web* bundle, bundles the Lynx Web Platform runtime, and
# publishes a static site to GitHub Pages so the app can be tried in a browser.
#
# One-time setup: in the repo, Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". The site will be served at
# https://<owner>.github.io/<repo>/ (e.g. https://huxpro.github.io/BusyWeek/).

on:
  push:
    branches: [master, claude/vue-lynx-port-mxmd1y]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
