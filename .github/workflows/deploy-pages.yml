name: Deploy Vue Lynx web to GitHub Pages

# Builds the Vue Lynx web site (app + Lynx Web Platform runtime + the original
# edition at /legacy/) and deploys it via the official GitHub Pages Actions
# pipeline. This is the correct method when the repo's Pages "Source" is set to
# "GitHub Actions" (Settings -> Pages -> Build and deployment -> Source).
#
# dist/ includes a CNAME file (from web/CNAME), so the custom domain
# (huangxuan.me) is preserved on every deploy.
#
# Live at: https://huangxuan.me/BusyWeek/

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
