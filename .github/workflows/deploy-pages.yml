name: Deploy Vue Lynx web to GitHub Pages

# Builds the Vue Lynx *web* bundle (app + Lynx Web Platform runtime) and
# publishes the static site to the `gh-pages` branch, which this repo's
# GitHub Pages is configured to serve. No repo settings change is required.
#
# Runs on pushes to `master` (i.e. when PR #1 merges) and can be triggered
# manually from any branch via "Run workflow".
#
# Live at: https://huxpro.github.io/BusyWeek/

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

# One deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:web
      - name: Publish dist/ to gh-pages
        run: |
          cd dist
          git init -q
          git checkout -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${GITHUB_SHA} to GitHub Pages"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
