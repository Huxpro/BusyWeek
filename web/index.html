<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <!-- Lock zoom: focusing an input must not zoom the page (as the original
         legacy edition did). maximum-scale + user-scalable=no. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>BusyWeek! · Vue Lynx (Web)</title>
    <meta
      name="description"
      content="BusyWeek! — a time-based todo list, ported to Vue Lynx and running on the Lynx Web Platform."
    />

    <!-- Web app icons — cross-platform (favicon, iOS home-screen, Android/PWA
         via the manifest). Extends the original edition's apple-touch-icon set. -->
    <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="./icons/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="./icons/apple-touch-icon-114.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#29b6f6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="BusyWeek!" />
    <!--
      Lynx Web Platform runtime (@lynx-js/web-core, client_prod build). It is
      copied into ./static by scripts/assemble-web.mjs so the page is fully
      self-contained — no CDN. The runtime loads its async chunks from ./static/.
    -->
    <script type="module" src="./static/js/client.js"></script>
    <link rel="stylesheet" href="./static/css/client.css" />
    <style>
      /* Lock the outer container: no page scroll / rubber-band; the app owns
         the whole viewport and only its inner list scrolls. */
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
        background: #29b6f6; /* blue fallback behind the top status bar */
      }
      body {
        position: fixed;
        inset: 0;
        -webkit-user-select: none;
      }
      /* The Lynx viewport tracks the visual viewport so the on-screen keyboard
         pushes the app's bottom controls up instead of covering them. */
      lynx-view {
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        border: none;
      }

      /* Header-triggered overflow menu: Lynx bundle URL + legacy version. */
      .ovf {
        position: fixed;
        left: 12px;
        right: auto;
        top: calc(62px + env(safe-area-inset-top));
        z-index: 2147483647;
        font: 500 14px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        pointer-events: none;
      }
      .ovf-menu {
        position: relative;
        left: 0;
        right: auto;
        top: 0;
        min-width: 218px;
        padding: 6px;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 12px 32px rgba(10, 30, 60, 0.3);
        opacity: 0;
        transform: translateY(-6px) scale(0.98);
        transform-origin: top left;
        pointer-events: none;
        transition: opacity 0.18s ease, transform 0.18s ease;
      }
      .ovf.open .ovf-menu {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }
      .ovf-item {
        display: flex;
        align-items: center;
        gap: 11px;
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: #21303d;
        font: inherit;
        text-align: left;
        text-decoration: none;
        cursor: pointer;
        box-sizing: border-box;
      }
      .ovf-item:hover { background: #eef6fd; }
      .ovf-item:active { background: #e1eefb; }
      .ovf-ico { font-size: 17px; width: 22px; text-align: center; flex: none; }
      .ovf-txt { display: flex; flex-direction: column; }
      .ovf-sub { font-size: 11px; color: #8a96a3; margin-top: 2px; }
    </style>
  </head>
  <body>
    <!-- The bundle URL is assigned after the web NativeModule bridge is ready. -->
    <lynx-view id="busyweek-view" height="100vh" width="100vw"></lynx-view>

    <script>
      // Vue Lynx runs application code in a worker, where window.localStorage
      // does not exist. Expose the same NativeLocalStorageModule contract used
      // on iOS/Android and execute its storage operations in the host window.
      ;(function installWebStorageModule() {
        var el = document.getElementById('busyweek-view')
        var moduleSource = `
          export default function (_NativeModules, NativeModulesCall) {
            return {
              setStorageItem: function (key, value) {
                NativeModulesCall('setStorageItem', { key: key, value: value })
              },
              getStorageItem: function (key, callback) {
                NativeModulesCall('getStorageItem', { key: key }).then(callback)
              },
              clearStorage: function () {
                NativeModulesCall('clearStorage', {})
              }
            }
          }
        `
        var moduleUrl = URL.createObjectURL(
          new Blob([moduleSource], { type: 'text/javascript' }),
        )

        customElements.whenDefined('lynx-view').then(function () {
          el.onNativeModulesCall = function (name, data, moduleName) {
            if (moduleName !== 'NativeLocalStorageModule') return null
            try {
              if (name === 'getStorageItem') {
                return localStorage.getItem(data.key)
              }
              if (name === 'setStorageItem') {
                localStorage.setItem(data.key, data.value)
                return null
              }
              if (name === 'clearStorage') {
                localStorage.removeItem('busyWeek')
              }
            } catch (error) {
              console.warn('BusyWeek storage is unavailable', error)
            }
            return null
          }
          el.nativeModulesMap = { NativeLocalStorageModule: moduleUrl }
          el.setAttribute('url', './main.web.bundle')
        })
      })()
    </script>

    <script>
      // Keyboard avoidance (web): resize the Lynx viewport to the visual
      // viewport so the soft keyboard pushes the app's bottom bar up rather
      // than covering it. iOS Safari shrinks visualViewport when the keyboard
      // shows; we mirror that onto <lynx-view>.
      ;(function () {
        var vv = window.visualViewport
        var el = document.querySelector('lynx-view')
        if (!vv || !el) return
        function sync() {
          el.style.height = vv.height + 'px'
          el.style.transform = 'translateY(' + vv.offsetTop + 'px)'
        }
        vv.addEventListener('resize', sync)
        vv.addEventListener('scroll', sync)
        sync()
      })()
    </script>

    <script>
      // Rspeedy's Lynx CSS pipeline intentionally omits browser media queries.
      // Inject the legacy desktop adaptation into the web runtime's open
      // shadow root after the app stylesheet has mounted. This keeps native
      // layout unchanged while letting the browser own responsive behaviour.
      ;(function installWebEnhancements() {
        var host = document.querySelector('lynx-view')
        if (!host) return
        function inject() {
          var root = host.shadowRoot
          if (!root || !root.querySelector('.app')) {
            requestAnimationFrame(inject)
            return
          }
          // #2971 maps <textarea> to <x-textarea>, but the PR preview's WASM
          // constants do not yet enable the element-level event bridge. A
          // listener on the custom element activates its existing lynxinput
          // forwarding before the composer can receive real keystrokes.
          var textarea = root.querySelector('#addpage-ta')
          if (textarea) textarea.addEventListener('lynxinput', function () {})
          if (root.getElementById('busyweek-web-responsive')) return
          var style = document.createElement('style')
          style.id = 'busyweek-web-responsive'
          style.textContent = `
            .addpage-input:not([l-e-name])::part(textarea)::placeholder {
              color: rgba(255, 255, 255, 0.68);
            }

            .todo-text:not([l-e-name]) {
              white-space: pre-wrap;
              word-break: break-word;
              overflow-wrap: anywhere;
            }

            @media all and (min-width: 640px) {
              .timeline:not([l-e-name]) {
                width: 70%;
                margin-left: 15%;
              }
              .addpage:not([l-e-name]) {
                width: 500px;
                height: 60%;
                left: auto;
                right: 86px;
                top: auto;
                bottom: 63px;
                border-radius: 14px;
                overflow: hidden;
                box-shadow: 0 18px 48px rgba(24, 65, 94, 0.28);
                transform: translateY(100vh);
              }
              .addpage--open:not([l-e-name]) { transform: translateY(0); }
              .addpage-bar:not([l-e-name]) {
                height: 56px;
                padding-top: 0;
              }
              .addpage-bottom:not([l-e-name]) { padding-bottom: 20px; }
              .sheet-panel:not([l-e-name]) {
                width: 500px;
                align-self: flex-end;
                margin-right: 86px;
                margin-bottom: 63px;
                border-radius: 18px;
                padding-bottom: 12px;
                overflow: hidden;
                opacity: 0;
                transform: translateY(24px) scale(0.98);
                transform-origin: bottom right;
                box-shadow: 0 18px 48px rgba(24, 65, 94, 0.28);
                transition: opacity 180ms ease,
                  transform 240ms cubic-bezier(0.22, 1, 0.36, 1);
              }
              .sheet-root--open:not([l-e-name]) .sheet-panel:not([l-e-name]) {
                opacity: 1;
                transform: translateY(0) scale(1);
              }
              .dp-list:not([l-e-name]) { height: 208px; }
              .dp-content:not([l-e-name]) {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
              }
              .dp-item:not([l-e-name]) {
                width: 50%;
                box-sizing: border-box;
              }
            }

            @media all and (min-width: 800px) {
              .delete:not([l-e-name]) {
                opacity: 0;
                transition: opacity 180ms ease, background-color 180ms ease;
              }
              .todo:hover .delete:not([l-e-name]) { opacity: 1; }
            }

            @media all and (min-width: 1000px) {
              .timeline:not([l-e-name]) {
                width: 57%;
                margin-left: 21.5%;
              }
            }

            @media (prefers-reduced-motion: reduce) {
              .todo-enter-active:not([l-e-name]) .todo:not([l-e-name]),
              .todo-leave-active:not([l-e-name]) .todo:not([l-e-name]),
              .day-enter-active:not([l-e-name]) .day-group:not([l-e-name]),
              .day-leave-active:not([l-e-name]) .day-group:not([l-e-name]),
              .day-slot:not([l-e-name]),
              .todo-slot:not([l-e-name]),
              .day-list:not([l-e-name]),
              .day-todos:not([l-e-name]) {
                transition-duration: 0.01ms;
              }
              .addpage:not([l-e-name]),
              .completed-toggle-label:not([l-e-name]),
              .completed-toggle-track:not([l-e-name]),
              .completed-toggle-thumb:not([l-e-name]),
              .sheet-backdrop:not([l-e-name]),
              .sheet-panel:not([l-e-name]),
              .checkbox:not([l-e-name]),
              .checkbox-mark:not([l-e-name]),
              .delete:not([l-e-name]) {
                transition-duration: 0.01ms;
              }
              .quick-day:not([l-e-name]) {
                transition-duration: 0.01ms;
              }
              .app:not([l-e-name]),
              .empty-badge:not([l-e-name]),
              .today-dot:not([l-e-name]),
              .fab:not([l-e-name]) {
                animation-duration: 0.01ms;
                animation-iteration-count: 1;
              }
            }
          `
          root.appendChild(style)
        }
        inject()
      })()
    </script>

    <!-- Hidden Web menu: tapping the BusyWeek brand in the Lynx header opens
         it. There is intentionally no floating Web-only trigger button. -->
    <div class="ovf" id="ovf">
      <div class="ovf-menu" role="menu" aria-hidden="true">
        <button class="ovf-item" id="ovf-copy" type="button" role="menuitem">
          <span class="ovf-ico">📱</span>
          <span class="ovf-txt">
            <span id="ovf-copy-label">复制 Lynx Bundle URL</span>
            <span class="ovf-sub">在 Lynx Explorer 中打开原生版</span>
          </span>
        </button>
        <a class="ovf-item" href="./legacy/" role="menuitem">
          <span class="ovf-ico">🕹️</span>
          <span class="ovf-txt">
            <span>Legacy 版本</span>
            <span class="ovf-sub">最初的 Web 版 (Vue 0.12)</span>
          </span>
        </a>
      </div>
    </div>
    <script>
      ;(function () {
        var root = document.getElementById('ovf')
        var menu = root.querySelector('.ovf-menu')
        var copy = document.getElementById('ovf-copy')
        var copyLabel = document.getElementById('ovf-copy-label')
        // ?fullscreen=true so Lynx Explorer opens the bundle full-screen
        // (matches the QR-code schema in lynx.config.ts).
        var url = new URL('./main.lynx.bundle?fullscreen=true', location.href).href
        copy.title = url
        function setOpen(open) {
          root.classList.toggle('open', open)
          menu.setAttribute('aria-hidden', open ? 'false' : 'true')
        }
        function toggleMenu(e) {
          e.stopPropagation()
          setOpen(!root.classList.contains('open'))
        }
        function bindHeaderBrand() {
          var host = document.getElementById('busyweek-view')
          var brand = host && host.shadowRoot && host.shadowRoot.querySelector('.brand')
          if (!brand) {
            requestAnimationFrame(bindHeaderBrand)
            return
          }
          brand.setAttribute('role', 'button')
          brand.setAttribute('tabindex', '0')
          brand.setAttribute('aria-label', '更多')
          brand.setAttribute('aria-haspopup', 'true')
          brand.addEventListener('click', toggleMenu)
          brand.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault()
              toggleMenu(e)
            }
          })
        }
        bindHeaderBrand()
        document.addEventListener('click', function (e) {
          if (!root.contains(e.target)) setOpen(false)
        })
        var resetTimer
        copy.addEventListener('click', function (e) {
          e.stopPropagation()
          function done() {
            copyLabel.textContent = '已复制 ✓'
            clearTimeout(resetTimer)
            resetTimer = setTimeout(function () {
              copyLabel.textContent = '复制 Lynx Bundle URL'
              setOpen(false)
            }, 1200)
          }
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(done, fallback)
          } else {
            fallback()
          }
          function fallback() {
            var ta = document.createElement('textarea')
            ta.value = url
            ta.style.position = 'fixed'
            ta.style.opacity = '0'
            document.body.appendChild(ta)
            ta.select()
            try {
              document.execCommand('copy')
            } catch (e) {}
            document.body.removeChild(ta)
            done()
          }
        })
      })()
    </script>
  </body>
</html>
